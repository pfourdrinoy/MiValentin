<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ton Bouquet de Saint-Valentin</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #fce4ec;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
    }

    h1 {
        color: #c2185b;
        margin-bottom: 10px;
    }

    button {
        background-color: #c2185b;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        margin-bottom: 110px;
    }

    .vase {
        position: relative;
        width: 120px;
        height: 150px;
        background-color: #8e44ad;
        border-radius: 10px 10px 50% 50%;
        margin-bottom: 30px;
        overflow: visible;
    }

    .flower {
        position: absolute;
        width: 50px;
        height: 80px;
        transform-origin: bottom center;
        transition: all 0.5s ease;
    }

    .stem {
        position: absolute;
        width: 3px;
        height: 80px;
        background-color: #2ecc71;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
    }

    .petals {
        position: absolute;
        width: 50px;
        height: 30px;
        border-radius: 50% 50% 0 0;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
    }

    #photo-montage {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 10px;
        padding: 20px;
        max-width: 600px;
        margin-top: 20px;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .montage-photo {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
        border: 3px solid white;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
    }

    .montage-photo:nth-child(1) { transform: rotate(-5deg); }
    .montage-photo:nth-child(2) { transform: rotate(3deg); }
    .montage-photo:nth-child(3) { transform: rotate(-2deg); }
    .montage-photo:nth-child(4) { transform: rotate(5deg); }
    .montage-photo:nth-child(5) { transform: rotate(-3deg); }
    .montage-photo:nth-child(6) { transform: rotate(2deg); }
</style>
</head>
<body>

<h1>Ton Bouquet de Saint-Valentin</h1>
<button id="addFlower">💐 Ajoute une fleur</button>
<div class="vase" id="vase"></div>
<div id="photo-montage"></div>

<script>
const vase = document.getElementById('vase');
const button = document.getElementById('addFlower');
const photoMontage = document.getElementById('photo-montage');

let flowerCount = 0;
let photoCount = 0;
const maxFlowers = 6;

const colors = ['#e91e63','#ff5252','#ff80ab','#ff4081','#c2185b','#ffeb3b','#ffc107'];
const photoUrls = [
    "photos1.jpg",
    "photos2.jpg",
    "photos3.jpg",
    "photos4.jpg",
    "photos5.jpg",
    "photos6.jpg"
];

button.addEventListener('click', () => {
    if(flowerCount >= maxFlowers) return;

    // Création de la fleur
    const flower = document.createElement('div');
    flower.className = 'flower';

    // Rotation aléatoire
    const rotation = Math.floor(Math.random() * 91) - 45;

    // Position dans le vase
    const offsetX = (flowerCount - 2) * 4; // espace horizontal
    flower.style.left = `calc(50% + ${offsetX}px)`;
    flower.style.bottom = `150px`;
    flower.style.transform = `translateX(-50%) rotate(${rotation}deg)`;

    // Couleur pétales
    const color = colors[Math.floor(Math.random() * colors.length)];
    flower.innerHTML = `
        <div class="petals" style="background-color:${color};"></div>
        <div class="stem"></div>
    `;

    vase.appendChild(flower);
    flowerCount++;

    // Ajouter la photo correspondante dans le montage
    if(photoCount < photoUrls.length) {
        const photo = document.createElement('img');
        photo.src = photoUrls[photoCount];
        photo.className = 'montage-photo';
        photoMontage.appendChild(photo);
        photoCount++;
    }
});
</script>

</body>
</html>
