<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vase à fleurs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f7f7f7;
        }

        #vase {
            width: 200px;
            height: 300px;
            margin: 40px auto;
            border: 4px solid #555;
            border-top: none;
            border-radius: 0 0 20px 20px;
            background-color: #e0f7fa;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-end;
            padding: 10px;
        }

        .fleur {
            font-size: 30px;
            margin: 5px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background-color: #ff8a80;
            color: white;
        }

        button:hover {
            background-color: #ff5252;
        }
    </style>
</head>
<body>

    <h1>🌼 Ajouter des fleurs dans le vase 🌼</h1>

    <div id="vase"></div>

    <button onclick="ajouterFleur()">Ajouter une fleur</button>

    <script>
        function ajouterFleur() {
            const vase = document.getElementById("vase");
            const fleur = document.createElement("div");
            fleur.className = "fleur";
            fleur.textContent = "🌸";
            vase.appendChild(fleur);
        }
    </script>

</body>
</html>
