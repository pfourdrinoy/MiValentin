<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Bouquet de Saint-Valentin</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 500px;
            margin-bottom: 20px;
        }

        h1 {
            color: #c2185b;
            margin-bottom: 10px;
        }

        p {
            color: #795548;
        }

        button {
            background-color: #c2185b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .vase {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 150px;
            background-color: #8e44ad;
            border-radius: 10px 10px 50% 50%;
            z-index: 10;
            transition: background-color 0.3s;
        }

        .vase.hover {
            background-color: #9b59b6;
        }

        .heart {
            position: absolute;
            cursor: grab;
            z-index: 5;
            width: 40px;
            height: 40px;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 30px;
            background-color: inherit;
            border-radius: 20px 20px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            transform: rotate(45deg);
            transform-origin: 100% 100%;
            left: 20px;
        }

        .message {
            margin-top: 20px;
            font-style: italic;
            color: #795548;
            display: none;
        }

        #photo-montage {
            position: relative;
            width: 500px;
            height: 400px;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .montage-photo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }

        .montage-photo:nth-child(1) { transform: rotate(-5deg); }
        .montage-photo:nth-child(2) { transform: rotate(3deg); }
        .montage-photo:nth-child(3) { transform: rotate(-2deg); }
        .montage-photo:nth-child(4) { transform: rotate(5deg); }
        .montage-photo:nth-child(5) { transform: rotate(-3deg); }
        .montage-photo:nth-child(6) { transform: rotate(2deg); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ton Bouquet de Saint-Valentin</h1>
        <p>Attrape les cœurs et mets-les dans le vase 💖</p>
        <button id="spawnHearts">💖 Faire apparaître les cœurs</button>
        <div class="vase" id="vase" ondragover="allowDrop(event)" ondrop="dropHeart(event)"></div>
        <div class="message" id="message">
            Joyeuse Saint-Valentin, [Son Prénom] 💖<br>
            Chaque cœur est un souvenir avec toi.
        </div>
    </div>

    <div id="photo-montage"></div>

    <script>
        const container = document.querySelector('.container');
        const spawnBtn = document.getElementById('spawnHearts');
        const vase = document.getElementById('vase');
        const message = document.getElementById('message');
        const photoMontage = document.getElementById('photo-montage');

        let heartCount = 0;
        let photoCount = 0;

        const photoUrls = [
            "photos1.jpg",
            "photos2.jpg",
            "photos3.jpg",
            "photos4.jpg",
            "photos5.jpg",
            "photos6.jpg"
        ];

        spawnBtn.addEventListener('click', () => {
            spawnBtn.style.display = 'none';
            for (let i = 0; i < 6; i++) {
                createHeart();
            }
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.draggable = true;
            heart.id = 'heart-' + heartCount++;

            // Position aléatoire
            heart.style.left = Math.random() * 80 + '%';
            heart.style.top = Math.random() * 200 + 100 + 'px';

            // Couleur aléatoire
            const colors = ['#e91e63', '#ff5252', '#ff80ab', '#ff4081', '#c2185b', '#ffeb3b', '#ffc107'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            heart.style.backgroundColor = color;

            heart.addEventListener('dragstart', e => {
                e.dataTransfer.setData('id', heart.id);
            });

            container.appendChild(heart);
        }

        function allowDrop(event) {
            event.preventDefault();
            vase.classList.add('hover');
        }

        function dropHeart(event) {
            event.preventDefault();
            vase.classList.remove('hover');

            const id = event.dataTransfer.getData('id');
            const heart = document.getElementById(id);

            // Position aléatoire dans le vase
            const randomX = 20 + Math.random() * 60;
            const randomY = 10 + Math.random() * 30;
            const randomScale = 0.5 + Math.random() * 0.5;

            heart.style.position = 'absolute';
            heart.style.left = randomX + '%';
            heart.style.top = randomY + 'px';
            heart.style.transform = `translateX(-50%) scale(${randomScale})`;
            heart.style.zIndex = '1';
            heart.draggable = false;

            vase.appendChild(heart);

            // Ajouter une photo au montage
            if (photoCount < photoUrls.length) {
                const photoUrl = photoUrls[photoCount];
                const photo = document.createElement('img');
                photo.src = photoUrl;
                photo.className = 'montage-photo';
                photoMontage.appendChild(photo);
                photoCount++;
            }

            if (vase.children.length >= 5) {
                message.style.display = 'block';
            }
        }
    </script>
</body>
</html>
