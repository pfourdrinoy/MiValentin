<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ton Bouquet de Saint-Valentin</title>
<!-- Police calligraphie Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
       body {
        font-family: 'Arial', sans-serif;
        background-color: #fce4ec;
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* pas centré verticalement */
        align-items: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        overflow-y: auto; /* scroll vertical activé */
        position: relative;
        padding-bottom: 200px; /* espace pour descendre en bas */
    }

    h1 {
        font-family: 'Great Vibes', cursive;
        font-size: 56px;
        margin-bottom: 10px;
        background: linear-gradient(45deg, #e91e63, #ff4081);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    button {
        background-color: #c2185b;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        margin-bottom: 120px;
    }

    .vase {
        position: relative;
        width: 80px;
        height: 110px;
        background-color: #8e44ad;
        border-radius: 10px 10px 50% 50%;
        margin-bottom: 40px;
        overflow: visible;
    }

    .flower {
        position: absolute;
        width: 50px;
        height: 80px;
        transform-origin: bottom center;
        transition: all 0.5s ease;
    }

    .stem {
        position: absolute;
        width: 3px;
        height: 80px;
        background-color: #2ecc71;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
    }

    .petals {
        position: absolute;
        width: 50px;
        height: 30px;
        border-radius: 50% 50% 0 0;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
    }

    #photo-montage {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 10px;
        padding: 20px;
        max-width: 600px;
        margin-top: 10px;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .montage-photo {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
        border: 3px solid white;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
    }

    .montage-photo:nth-child(1) { transform: rotate(-5deg); }
    .montage-photo:nth-child(2) { transform: rotate(3deg); }
    .montage-photo:nth-child(3) { transform: rotate(-4deg); }
    .montage-photo:nth-child(4) { transform: rotate(5deg); }
    .montage-photo:nth-child(5) { transform: rotate(-3deg); }
    .montage-photo:nth-child(6) { transform: rotate(2deg); }

    /* Styles pour confettis */
    .confetti {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.9;
        animation: fall linear forwards;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(var(--fall-height)) rotate(720deg); opacity: 0; }
    }

    /* Message joyeux sous les photos */
    #valentine-message {
        font-family: 'Great Vibes', cursive;
        font-size: 36px;
        color: #e91e63;
        margin-top: 20px;
        display: none;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<h1>Ton Bouquet de Saint-Valentin</h1>
<button id="addFlower">💐 Ajoute une fleur</button>
<div class="vase" id="vase"></div>
<div id="photo-montage"></div>
<div id="valentine-message">Joyeuse Saint-Valentin mon amour 💖</div>

<script>
const vase = document.getElementById('vase');
const button = document.getElementById('addFlower');
const photoMontage = document.getElementById('photo-montage');
const message = document.getElementById('valentine-message');

let flowerCount = 0;
let photoCount = 0;
const maxFlowers = 6;

const colors = ['#e91e63','#ff5252','#ff80ab','#ff4081','#c2185b','#ffeb3b','#ffc107'];
const photoUrls = [
    "photos1.jpg",
    "photos2.jpg",
    "photos3.jpg",
    "photos4.jpg",
    "photos5.jpg",
    "photos6.jpg"
];

button.addEventListener('click', () => {
    if(flowerCount >= maxFlowers) return;

    // Création de la fleur
    const flower = document.createElement('div');
    flower.className = 'flower';

    const rotation = Math.floor(Math.random() * 91) - 45;
    const offsetX = (flowerCount - 2) * 4;
    flower.style.left = `calc(50% + ${offsetX}px)`;
    flower.style.bottom = `110px`;
    flower.style.transform = `translateX(-50%) rotate(${rotation}deg)`;

    const color = colors[Math.floor(Math.random() * colors.length)];
    flower.innerHTML = `<div class="petals" style="background-color:${color};"></div>
                        <div class="stem"></div>`;

    vase.appendChild(flower);
    flowerCount++;

    // Ajouter la photo correspondante
    if(photoCount < photoUrls.length) {
        const photo = document.createElement('img');
        photo.src = photoUrls[photoCount];
        photo.className = 'montage-photo';
        photoMontage.appendChild(photo);
        photoCount++;
    }

    // Confettis + afficher message à la dernière fleur
    if(flowerCount === maxFlowers) {
        spawnConfetti();
        message.style.display = 'block';
    }
});

// Fonction pour générer les confettis sur toute la page
function spawnConfetti() {
    const colorsConfetti = ['#e91e63','#ff5252','#ff80ab','#ff4081','#c2185b','#ffeb3b','#ffc107','#4caf50','#2196f3'];
    const confettiCount = 150;
    const fallHeight = window.innerHeight + 50;

    for(let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.backgroundColor = colorsConfetti[Math.floor(Math.random() * colorsConfetti.length)];

        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.top = Math.random() * window.innerHeight + 'px';

        const size = Math.random() * 8 + 4;
        confetti.style.width = size + 'px';
        confetti.style.height = size + 'px';
        confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
        confetti.style.setProperty('--fall-height', fallHeight + 'px');

        document.body.appendChild(confetti);

        confetti.addEventListener('animationend', () => confetti.remove());
    }
}
</script>

</body>
</html>
