<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton Bouquet de Saint-Valentin</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fce4ec;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 500px;
            margin-bottom: 20px;
        }

        h1 {
            color: #c2185b;
            margin-bottom: 10px;
        }

        p {
            color: #795548;
        }

        button {
            background-color: #c2185b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .vase {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 150px;
            background-color: #8e44ad;
            border-radius: 10px 10px 50% 50%;
            z-index: 10;
        }

        .vase.hover {
            background-color: #9b59b6;
        }

        .flower {
            position: absolute;
            width: 60px;
            height: 120px;
            cursor: grab;
        }

        .stem {
            position: absolute;
            width: 3px;
            height: 80px;
            background-color: #2ecc71;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .petals {
            position: absolute;
            width: 60px;
            height: 40px;
            border-radius: 50% 50% 0 0;
            top: 0;
            left: 0;
        }

        .message {
            margin-top: 20px;
            font-style: italic;
            color: #795548;
            display: none;
        }

        /* Conteneur pour le montage photo */
        #photo-montage {
            position: relative;
            width: 500px;
            height: 400px;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Style des photos dans le montage */
        .montage-photo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }

        /* Effet de rotation légère aléatoire pour un style dynamique */
        .montage-photo:nth-child(1) { transform: rotate(-5deg); }
        .montage-photo:nth-child(2) { transform: rotate(3deg); }
        .montage-photo:nth-child(3) { transform: rotate(-2deg); }
        .montage-photo:nth-child(4) { transform: rotate(5deg); }
        .montage-photo:nth-child(5) { transform: rotate(-3deg); }
        .montage-photo:nth-child(6) { transform: rotate(2deg); }
    </style>
</head>

<body>
<div class="container">
    <h1>Ton Bouquet de Saint-Valentin</h1>
    <p>Attrape les fleurs et mets-les dans le vase 💐</p>

    <button id="spawnFlowers">🌸 Faire apparaître les fleurs</button>

    <div class="vase"
         id="vase"
         ondragover="allowDrop(event)"
         ondrop="dropFlower(event)">
    </div>

    <div class="message" id="message">
        Joyeuse Saint-Valentin, [Son Prénom] 💖<br>
        Chaque fleur est un souvenir avec toi.
    </div>
</div>

<!-- Conteneur pour le montage photo -->
<div id="photo-montage"></div>

<script>
    const container = document.querySelector('.container');
    const spawnBtn = document.getElementById('spawnFlowers');
    const vase = document.getElementById('vase');
    const message = document.getElementById('message');
    const photoMontage = document.getElementById('photo-montage');

    let flowerCount = 0;
    let photoCount = 0;

    // Chemins relatifs vers tes images (à la racine du dépôt)
    const photoUrls = [
        "photos1.jpg",  // Remplace par le nom exact de tes images
        "photos2.jpg",
        "photos3.jpg",
        "photos4.jpg",
        "photos5.jpg",
        "photos6.jpg"
    ];

    spawnBtn.addEventListener('click', () => {
        spawnBtn.style.display = 'none';

        for (let i = 0; i < 6; i++) {
            createFlower();
        }
    });

    function createFlower() {
        const flower = document.createElement('div');
        flower.className = 'flower';
        flower.draggable = true;
        flower.id = 'flower-' + flowerCount++;

        flower.style.left = Math.random() * 80 + '%';
        flower.style.top = Math.random() * 200 + 100 + 'px';

        const colors = ['#e91e63', '#ff5252', '#ff80ab', '#ff4081', '#c2185b'];
        const color = colors[Math.floor(Math.random() * colors.length)];

        flower.innerHTML = `
            <div class="petals" style="background-color:${color}"></div>
            <div class="stem"></div>
        `;

        flower.addEventListener('dragstart', e => {
            e.dataTransfer.setData('id', flower.id);
        });

        container.appendChild(flower);
    }

    function allowDrop(event) {
        event.preventDefault();
        vase.classList.add('hover');
    }

    function dropFlower(event) {
        event.preventDefault();
        vase.classList.remove('hover');

        const id = event.dataTransfer.getData('id');
        const flower = document.getElementById(id);

        flower.style.position = 'absolute';
        flower.style.left = '50%';
        flower.style.top = '40px';
        flower.style.transform = 'translateX(-50%) scale(0.8)';
        flower.draggable = false;

        vase.appendChild(flower);

        // Ajouter une photo au montage
        if (photoCount < photoUrls.length) {
            const photoUrl = photoUrls[photoCount];
            const photo = document.createElement('img');
            photo.src = photoUrl;
            photo.className = 'montage-photo';
            photoMontage.appendChild(photo);
            photoCount++;
        }

        if (vase.children.length >= 5) {
            message.style.display = 'block';
        }
    }
</script>
</body>
</html>
