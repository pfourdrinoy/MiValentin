<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fleur dans le vase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
        }

        .zone {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
        }

        .fleur {
            font-size: 40px;
            cursor: grab;
        }

        #vase {
            width: 200px;
            height: 300px;
            border: 4px solid #555;
            border-top: none;
            border-radius: 0 0 20px 20px;
            background-color: #dff5f7;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-end;
            padding: 10px;
        }

        #vase.hover {
            background-color: #b2ebf2;
        }
    </style>
</head>
<body>

    <h1>🌼 Attrape la fleur et mets-la dans le vase 🌼</h1>

    <div class="zone">
        <!-- Fleur draggable -->
        <div 
            class="fleur" 
            draggable="true" 
            ondragstart="drag(event)"
            id="fleur">
            🌸
        </div>

        <!-- Vase -->
        <div 
            id="vase" 
            ondragover="autoriserDepot(event)"
            ondrop="deposer(event)">
        </div>
    </div>

    <script>
        function drag(event) {
            event.dataTransfer.setData("text", event.target.id);
        }

        function autoriserDepot(event) {
            event.preventDefault();
            document.getElementById("vase").classList.add("hover");
        }

        function deposer(event) {
            event.preventDefault();
            const id = event.dataTransfer.getData("text");
            const fleur = document.getElementById(id);

            // Cloner la fleur pour pouvoir la déposer plusieurs fois
            const nouvelleFleur = fleur.cloneNode(true);
            nouvelleFleur.removeAttribute("id");
            nouvelleFleur.setAttribute("draggable", "false");

            event.target.appendChild(nouvelleFleur);
            document.getElementById("vase").classList.remove("hover");
        }
    </script>

</body>
</html>
