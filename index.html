<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeuse Saint-Valentin !</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffebee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            color: #e91e63;
        }
        button {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        #message {
            display: none;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Joyeuse Saint-Valentin, [Son Prénom] !</h1>
        <p>Clique sur le cœur pour découvrir ton cadeau...</p>
        <button id="heartButton">💖</button>
        <div id="message">
            <p>Tu es la personne la plus incroyable que je connaisse. Merci d’être là.<br>
            <a href="[LIEN VERS UN CADEAU VIRTUEL OU UNE SURPRISE]" target="_blank">Clique ici pour ta surprise !</a></p>
        </div>
    </div>

    <script>
        document.getElementById('heartButton').addEventListener('click', function() {
            document.getElementById('message').style.display = 'block';
            this.style.display = 'none';
        });
    </script>
</body>
</html>
